name: Build and Push to GHCR

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web-enrichment-app
          file: ./web-enrichment-app/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/personal-obs-pipeline-web:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/personal-obs-pipeline-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ingestion image
        uses: docker/build-push-action@v6
        with:
          context: ./ingestion-engine
          file: ./ingestion-engine/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/personal-obs-pipeline-ingestion:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/personal-obs-pipeline-ingestion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-coolify:
    needs: [build-web, build-ingestion]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify redeploy
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_DEPLOY_TOKEN: ${{ secrets.COOLIFY_DEPLOY_TOKEN }}
        run: |
          if [ -n "$WEBHOOK_URL" ] && [ -n "$COOLIFY_DEPLOY_TOKEN" ]; then
            curl -fsS -X POST "$WEBHOOK_URL" \
              -H "Authorization: Bearer $COOLIFY_DEPLOY_TOKEN"
          fi
